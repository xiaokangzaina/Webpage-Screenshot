<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>网页截图配置</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="workspace-shell">
    <header class="workspace-head">
      <div><h2>网页截图</h2><p>选择群聊后配置该群的网页截图任务。</p></div>
      <div class="workspace-actions"><button class="btn-ghost" id="toggleThemeBtn">主题：自动</button><button class="btn-ghost" id="refreshGroupsBtn">同步群列表</button></div>
    </header>
    <main class="group-workspace">
      <aside class="group-sidebar">
        <input id="groupSearchInput" class="input-search" type="text" placeholder="搜索群名或群号" />
        <div id="groupList" class="group-list empty-hint">群列表加载中…</div>
      </aside>
      <section class="group-config-panel">
        <div class="group-config-head"><div><h3 id="currentGroupTitle">请选择群聊</h3><p id="currentGroupMeta">点击左侧群聊即可配置</p></div></div>
        <div id="groupForm" class="form-stack empty-hint">请从左侧选择一个群聊。</div>
        <div class="sticky-bar"><button class="btn-ghost danger" id="resetGroupBtn">清空该群配置</button><button class="btn-primary" id="saveGroupBtn">保存该群配置</button></div>
      </section>
    </main>
  </div>
  <div class="toast-layer" id="toastLayer"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
